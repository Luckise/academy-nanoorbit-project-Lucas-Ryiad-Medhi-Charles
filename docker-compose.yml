services:
    oracle-db:
        image: gvenzl/oracle-free:23.7-slim-faststart
        container_name: vls_oracle_23ai
        ports:
            - "1521:1521"
        environment:
            - ORACLE_PASSWORD=NanoOrbit_2026_VLS
            - APP_USER=VLS_ADMIN
            - APP_USER_PASSWORD=Admin_VLS_2026
        volumes:
            - oracle_data:/opt/oracle/oradata
            - ./scripts:/opt/oracle/scripts/startup
            - ./dump:/opt/oracle/dump
        networks:
            - nanoorbit-net

    api:
        build: ./api
        container_name: nanoorbit_api
        ports:
            - "5000:5000"
        environment:
            - DB_USER=VLS_ADMIN
            - DB_PASSWORD=Admin_VLS_2026
            - DB_DSN=oracle-db:1521/FREEPDB1
        depends_on:
            - oracle-db
        networks:
            - nanoorbit-net

    android-emulator:
        image: budtmo/docker-android:emulator_11.0
        container_name: nanoorbit_android
        privileged: true
        ports:
            - "6080:6080"   # noVNC web UI
            - "5554:5554"   # ADB emulator console
            - "5555:5555"   # ADB connect
        environment:
            - EMULATOR_DEVICE=Samsung Galaxy S10
            - WEB_VNC=true
            - APPIUM=false
            - API_BASE_URL=http://nanoorbit_api:5000/
        devices:
            - /dev/kvm
        depends_on:
            - api
        networks:
            - nanoorbit-net
        volumes:
            - android_data:/home/androidusr

networks:
    nanoorbit-net:
        driver: bridge

volumes:
    oracle_data:
    android_data:
